<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub 工作流启动器</title>
    <style>
        :root {
            --bg-color: #f5f5f5;
            --card-bg: #ffffff;
            --text-color: #333333;
            --text-secondary: #666666;
            --border-color: #e0e0e0;
            --primary-color: #2ea44f;
            --primary-hover: #2c974b;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 4px 16px rgba(0, 0, 0, 0.15);
        }

        [data-theme="dark"] {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --text-secondary: #8b949e;
            --border-color: #30363d;
            --primary-color: #238636;
            --primary-hover: #2ea043;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 4px 16px rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            box-shadow: var(--shadow-hover);
            transform: scale(1.05);
        }

        .theme-toggle svg {
            width: 24px;
            height: 24px;
            fill: var(--text-color);
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .card:hover {
            box-shadow: var(--shadow-hover);
        }

        .icon {
            width: 80px;
            height: 80px;
            margin-bottom: 24px;
        }

        .icon svg {
            width: 100%;
            height: 100%;
            fill: var(--primary-color);
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-color);
        }

        .description {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .config-section {
            margin-bottom: 24px;
            text-align: left;
        }

        .config-section label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-color);
        }

        .config-section input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-color);
            color: var(--text-color);
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .config-section input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(46, 164, 79, 0.1);
        }

        .config-section input::placeholder {
            color: var(--text-secondary);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            background: var(--primary-color);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
            width: 100%;
        }

        .btn:hover:not(:disabled) {
            background: var(--primary-hover);
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .status {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }

        .status.success {
            display: block;
            background: rgba(46, 164, 79, 0.1);
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
        }

        .status.error {
            display: block;
            background: rgba(207, 34, 46, 0.1);
            border: 1px solid #cf222e;
            color: #cf222e;
        }

        .status.loading {
            display: block;
            background: rgba(88, 166, 255, 0.1);
            border: 1px solid #58a6ff;
            color: #58a6ff;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid currentColor;
            border-right-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 平板端适配 */
        @media (max-width: 768px) {
            .card {
                padding: 32px;
            }

            h1 {
                font-size: 24px;
            }

            .description {
                font-size: 14px;
            }

            .icon {
                width: 64px;
                height: 64px;
            }
        }

        /* 手机端适配 */
        @media (max-width: 480px) {
            body {
                padding: 16px;
            }

            .card {
                padding: 24px;
                border-radius: 12px;
            }

            h1 {
                font-size: 20px;
            }

            .description {
                font-size: 14px;
                margin-bottom: 24px;
            }

            .icon {
                width: 56px;
                height: 56px;
                margin-bottom: 16px;
            }

            .btn {
                padding: 14px 24px;
                font-size: 15px;
            }

            .theme-toggle {
                width: 40px;
                height: 40px;
                top: 16px;
                right: 16px;
            }

            .theme-toggle svg {
                width: 20px;
                height: 20px;
            }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" title="切换主题">
        <svg id="sunIcon" viewBox="0 0 24 24" style="display: none;">
            <path d="M12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-13.5c.83 0 1.5.67 1.5 1.5v2c0 .83-.67 1.5-1.5 1.5s-1.5-.67-1.5-1.5V5c0-.83.67-1.5 1.5-1.5zm0 15c-.83 0-1.5.67-1.5 1.5v2c0 .83.67 1.5 1.5 1.5s1.5-.67 1.5-1.5v-2c0-.83-.67-1.5-1.5-1.5zm8.5-7.5c0 .83-.67 1.5-1.5 1.5h-2c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5h2c.83 0 1.5.67 1.5 1.5zM7 12c0 .83-.67 1.5-1.5 1.5h-2c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5h2c.83 0 1.5.67 1.5 1.5zm11.36-5.64c.59.59.59 1.54 0 2.12l-1.42 1.42c-.59.59-1.54.59-2.12 0-.59-.59-.59-1.54 0-2.12l1.42-1.42c.59-.59 1.54-.59 2.12 0zM6.18 16.24c.59.59.59 1.54 0 2.12l-1.42 1.42c-.59.59-1.54.59-2.12 0-.59-.59-.59-1.54 0-2.12l1.42-1.42c.59-.59 1.54-.59 2.12 0zm12.02 0l1.42 1.42c.59.59.59 1.54 0 2.12-.59.59-1.54.59-2.12 0l-1.42-1.42c-.59-.59-.59-1.54 0-2.12.59-.59 1.54-.59 2.12 0zM6.18 7.76c-.59-.59-.59-1.54 0-2.12l1.42-1.42c.59-.59 1.54-.59 2.12 0 .59.59.59 1.54 0 2.12l-1.42 1.42c-.59.59-1.54.59-2.12 0z"/>
        </svg>
        <svg id="moonIcon" viewBox="0 0 24 24">
            <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-3.03 0-5.5-2.47-5.5-5.5 0-1.82.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>
        </svg>
    </button>

    <div class="container">
        <div class="card">
            <div class="icon">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                </svg>
            </div>
            <h1>GitHub 工作流启动器</h1>
            <p class="description">输入您的 GitHub 仓库信息，点击下方按钮即可远程触发 GitHub Actions 工作流。</p>

            <div class="config-section">
                <label for="repoOwner">仓库所有者</label>
                <input type="text" id="repoOwner" placeholder="例如: octocat">
            </div>

            <div class="config-section">
                <label for="repoName">仓库名称</label>
                <input type="text" id="repoName" placeholder="例如: hello-world">
            </div>

            <div class="config-section">
                <label for="workflowId">工作流 ID 或文件名</label>
                <input type="text" id="workflowId" placeholder="例如: main.yml 或 123456">
            </div>

            <div class="config-section">
                <label for="branch">分支（可选）</label>
                <input type="text" id="branch" placeholder="默认: main">
            </div>

            <div class="config-section">
                <label for="token">GitHub Personal Access Token</label>
                <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
            </div>

            <button class="btn" id="triggerBtn">
                <svg viewBox="0 0 24 24">
                    <path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/>
                </svg>
                启动工作流
            </button>

            <div class="status" id="status"></div>
        </div>
    </div>

    <script>
        // 主题切换功能
        const themeToggle = document.getElementById('themeToggle');
        const sunIcon = document.getElementById('sunIcon');
        const moonIcon = document.getElementById('moonIcon');
        const html = document.documentElement;

        // 检查本地存储或系统偏好
        const savedTheme = localStorage.getItem('theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
            html.setAttribute('data-theme', 'dark');
            sunIcon.style.display = 'block';
            moonIcon.style.display = 'none';
        }

        themeToggle.addEventListener('click', () => {
            const isDark = html.getAttribute('data-theme') === 'dark';
            if (isDark) {
                html.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                sunIcon.style.display = 'none';
                moonIcon.style.display = 'block';
            } else {
                html.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                sunIcon.style.display = 'block';
                moonIcon.style.display = 'none';
            }
        });

        // 加载配置文件
        async function loadConfig() {
            try {
                const response = await fetch('config.json');
                if (response.ok) {
                    const config = await response.json();

                    // 填充表单
                    if (config.repoOwner) {
                        document.getElementById('repoOwner').value = config.repoOwner;
                    }
                    if (config.repoName) {
                        document.getElementById('repoName').value = config.repoName;
                    }
                    if (config.workflowId) {
                        document.getElementById('workflowId').value = config.workflowId;
                    }
                    if (config.branch) {
                        document.getElementById('branch').value = config.branch;
                    }
                }
            } catch (error) {
                console.log('配置文件加载失败:', error);
            }

            // 从本地存储加载 Token
            const savedToken = localStorage.getItem('gh_token');
            if (savedToken) {
                document.getElementById('token').value = savedToken;
            }
        }

        // 页面加载时读取配置
        loadConfig();

        // 工作流触发功能
        const triggerBtn = document.getElementById('triggerBtn');
        const statusDiv = document.getElementById('status');

        triggerBtn.addEventListener('click', async () => {
            const owner = document.getElementById('repoOwner').value.trim();
            const repo = document.getElementById('repoName').value.trim();
            const workflowId = document.getElementById('workflowId').value.trim();
            const branch = document.getElementById('branch').value.trim() || 'main';
            const token = document.getElementById('token').value.trim();

            // 验证输入
            if (!owner || !repo || !workflowId || !token) {
                showStatus('请填写所有必填字段', 'error');
                return;
            }

            // 保存 Token 到本地存储
            localStorage.setItem('gh_token', token);

            // 显示加载状态
            triggerBtn.disabled = true;
            showStatus('<span class="spinner"></span>正在启动工作流...', 'loading');

            try {
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/workflows/${workflowId}/dispatches`, {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/vnd.github.v3+json',
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        ref: branch
                    })
                });

                if (response.status === 204) {
                    showStatus('✅ 工作流启动成功！请前往 GitHub 查看运行状态。', 'success');
                } else if (response.status === 401) {
                    showStatus('❌ 认证失败：请检查您的 GitHub Token 是否正确。', 'error');
                } else if (response.status === 404) {
                    showStatus('❌ 未找到：请检查仓库名称、工作流 ID 是否正确。', 'error');
                } else {
                    const data = await response.json();
                    showStatus(`❌ 启动失败：${data.message || '未知错误'}`, 'error');
                }
            } catch (error) {
                showStatus(`❌ 请求失败：${error.message}`, 'error');
            } finally {
                triggerBtn.disabled = false;
            }
        });

        function showStatus(message, type) {
            statusDiv.innerHTML = message;
            statusDiv.className = 'status ' + type;
        }
    </script>
</body>
</html>
